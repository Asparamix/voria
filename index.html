<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cronache di Voria</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14110E; --bg-panel:#1C1710; --bg-panel-2:#241D14; --border:#3A2F1E;
    --paper:#EAE0C6; --paper-2:#E1D5B4; --ink:#2A2013;
    --gold:#C79A4B; --gold-soft:#8F7038;
    --text-light:#D8CBA9; --text-dim:#9C8F73;
    --teal:#3F6B5E; --rust:#9A4632; --ochre:#B08A44; --violet:#5C4A8A; --steel:#3D6B8C;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:transparent;color:var(--text-light);font-family:'Inter',sans-serif;}
  .codex{display:flex;flex-direction:column;height:100vh;min-height:600px;background:var(--bg);border-radius:10px;overflow:hidden;border:1px solid var(--border);}
  .codex-header{display:flex;align-items:center;gap:12px;padding:18px 22px;background:linear-gradient(180deg,#1A150F,#14110E);border-bottom:1px solid var(--border);}
  .map-btn{margin-left:auto;background:transparent;border:1px solid var(--gold-soft);color:var(--gold);padding:8px 14px;border-radius:20px;font-family:'Inter',sans-serif;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;}
  .map-btn:hover{background:rgba(199,154,75,0.12);}
  .map-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,6,0.94);z-index:100;align-items:center;justify-content:center;}
  .map-overlay.open{display:flex;}
  .map-scroll{width:100%;height:100%;overflow:auto;display:flex;align-items:center;justify-content:center;padding:20px;}
  .map-img{max-width:100%;height:auto;border-radius:6px;box-shadow:0 10px 40px rgba(0,0,0,0.6);border:1px solid var(--border);}
  .map-close{position:fixed;top:16px;right:18px;z-index:101;background:var(--bg-panel-2);border:1px solid var(--gold-soft);color:var(--paper);width:36px;height:36px;border-radius:50%;font-size:16px;cursor:pointer;}
  @media (max-width:760px){ .map-img{width:100%;} }
  .codex-mark{font-size:22px;color:var(--gold);text-shadow:0 0 12px rgba(199,154,75,0.5);}
  .codex-title h1{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:25px;margin:0;color:var(--paper);}
  .codex-sub{margin:2px 0 0;font-size:12px;color:var(--text-dim);}

  .codex-body{flex:1;display:flex;min-height:0;}
  .codex-sidebar{width:290px;flex-shrink:0;background:var(--bg-panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:16px 14px;min-height:0;}
  .search-wrap{position:relative;margin-bottom:14px;}
  #searchInput{width:100%;padding:9px 12px 9px 32px;border-radius:8px;border:1px solid var(--border);background:var(--bg-panel-2);color:var(--text-light);font-size:13px;}
  #searchInput::placeholder{color:var(--text-dim);}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;}

  .tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
  .tab{padding:7px 12px;border-radius:16px;background:var(--bg-panel-2);border:1px solid var(--border);color:var(--text-dim);font-size:11.5px;font-weight:600;cursor:pointer;}
  .tab.active{background:var(--paper);color:var(--ink);border-color:var(--gold);}
  .tab .dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle;}

  .entry-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px;}
  .entry-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;background:var(--bg-panel-2);border:1px solid transparent;cursor:pointer;}
  .entry-item:hover{background:#2A2216;}
  .entry-item.selected{border-color:var(--gold-soft);background:#2E2517;}
  .entry-icon{width:26px;height:26px;flex-shrink:0;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .entry-item .name{font-size:13.5px;font-weight:600;color:var(--paper-2);}
  .entry-item .cat-label{font-size:10.5px;color:var(--text-dim);text-transform:uppercase;}
  .empty-list{color:var(--text-dim);font-size:13px;padding:20px 6px;text-align:center;}

  .codex-content{flex:1;min-width:0;overflow-y:auto;padding:30px 40px;background:radial-gradient(ellipse at top left, rgba(199,154,75,0.06), transparent 60%), var(--bg);}
  .empty-state{color:var(--text-dim);font-family:'Crimson Text',serif;font-size:16px;font-style:italic;margin-top:60px;text-align:center;}

  .page{background:var(--paper);color:var(--ink);border-radius:4px;padding:32px 36px;box-shadow:0 8px 30px rgba(0,0,0,0.4);max-width:700px;border:1px solid #C9BA92;}
  .page-back{display:none;background:none;border:none;color:var(--gold);font-size:13px;cursor:pointer;margin-bottom:14px;padding:0;}
  .page-header{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:6px;}
  .page-title{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:700;margin:0;color:var(--ink);}
  .page-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;letter-spacing:0.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px;color:#fff;white-space:nowrap;}
  .page-tags{margin:10px 0 18px;display:flex;flex-wrap:wrap;gap:6px;}
  .tag-chip{font-size:11px;padding:3px 9px;border-radius:12px;background:rgba(42,32,19,0.08);color:var(--gold-soft);border:1px solid rgba(143,112,56,0.3);}
  .page-summary{font-family:'Crimson Text',serif;font-style:italic;font-size:16px;color:#4A3D26;border-left:3px solid var(--gold);padding-left:14px;margin:0 0 20px;}
  .page-body{font-family:'Crimson Text',serif;font-size:16.5px;line-height:1.65;white-space:pre-wrap;color:var(--ink);}
  .cronologia{margin-top:20px;padding-top:14px;border-top:1px solid #C9BA92;font-size:12.5px;color:#5A4A2E;}
  .cronologia-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.4px;margin-bottom:6px;color:#8A7642;}

  @media (max-width:760px){
    .codex-body{position:relative;}
    .codex-sidebar{width:100%;position:absolute;inset:0;z-index:5;background:var(--bg-panel);}
    .codex-sidebar.hide-mobile{display:none;}
    .codex-content{padding:18px 16px;}
    .page{padding:22px 18px;}
    .page-back{display:inline-block;}
    .codex-title h1{font-size:21px;}
  }
  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#3A2F1E;border-radius:4px;}
</style>
</head>

let activeCategory = 'tutti';
let searchTerm = '';
let selectedId = null;

function escapeHtml(s){ const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function buildTabs(){
  const present = [...new Set(ENTRIES.map(e=>e.categoria))];
  const tabs = document.getElementById('tabs');
  let html = `<button class="tab active" data-cat="tutti">Tutti</button>`;
  present.forEach(cat=>{
    const c = CATS[cat];
    html += `<button class="tab" data-cat="${cat}"><span class="dot" style="background:${c.color}"></span>${c.label}</button>`;
  });
  tabs.innerHTML = html;
  tabs.querySelectorAll('.tab').forEach(tab=>{
    tab.addEventListener('click', ()=>{
      tabs.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active'); activeCategory = tab.dataset.cat; renderList();
    });
  });
}

function filteredEntries(){
  return ENTRIES
    .filter(e => activeCategory === 'tutti' || e.categoria === activeCategory)
    .filter(e => {
      if(!searchTerm) return true;
      const hay = (e.nome + ' ' + (e.tags||[]).join(' ') + ' ' + (e.sommario||'')).toLowerCase();
      return hay.includes(searchTerm.toLowerCase());
    })
    .sort((a,b) => a.nome.localeCompare(b.nome, 'it'));
}

function renderList(){
  const list = document.getElementById('entryList');
  const items = filteredEntries();
  if(items.length === 0){
    list.innerHTML = '<div class="empty-list">Nessuna voce trovata.</div>';
    return;
  }
  list.innerHTML = items.map(e => {
    const cat = CATS[e.categoria];
    return `<div class="entry-item ${e.id===selectedId?'selected':''}" data-id="${e.id}">
      <div class="entry-icon" style="background:${cat.color}33;">${cat.icon}</div>
      <div><div class="name">${escapeHtml(e.nome)}</div><div class="cat-label">${cat.label}</div></div>
    </div>`;
  }).join('');
  list.querySelectorAll('.entry-item').forEach(el=>{
    el.addEventListener('click', ()=>{
      selectedId = el.dataset.id; renderList(); renderContent();
      if(window.innerWidth <= 760) document.getElementById('sidebar').classList.add('hide-mobile');
    });
  });
}

function renderContent(){
  const content = document.getElementById('content');
  const entry = ENTRIES.find(e => e.id === selectedId);
  if(!entry){ content.innerHTML = '<div class="empty-state">Seleziona una voce dall\'Archivio per leggerla.</div>'; return; }
  const cat = CATS[entry.categoria];
  const cron = entry.cronologia || [];
  content.innerHTML = `
    <button class="page-back" id="backBtn">← Torna all'Archivio</button>
    <div class="page">
      <div class="page-header">
        <h2 class="page-title">${escapeHtml(entry.nome)}</h2>
        <span class="page-badge" style="background:${cat.color};">${cat.icon} ${cat.label}</span>
      </div>
      <div class="page-tags">${(entry.tags||[]).map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('')}</div>
      ${entry.sommario ? `<p class="page-summary">${escapeHtml(entry.sommario)}</p>` : ''}
      <div class="page-body">${escapeHtml(entry.descrizione)}</div>
      ${cron.length ? `<div class="cronologia"><div class="cronologia-label">Cronologia</div>${cron.map(c=>`<div>Sessione ${escapeHtml(String(c.sessione))}${c.data?` (${escapeHtml(c.data)})`:''}: ${escapeHtml(c.nota)}</div>`).join('')}</div>` : ''}
    </div>
  `;
  const back = document.getElementById('backBtn');
  if(back) back.addEventListener('click', ()=>{ document.getElementById('sidebar').classList.remove('hide-mobile'); });
}

document.getElementById('searchInput').addEventListener('input', (e)=>{ searchTerm = e.target.value; renderList(); });
document.getElementById('mapBtn').addEventListener('click', ()=>{ document.getElementById('mapOverlay').classList.add('open'); });
document.getElementById('mapCloseBtn').addEventListener('click', ()=>{ document.getElementById('mapOverlay').classList.remove('open'); });
document.getElementById('mapOverlay').addEventListener('click', (e)=>{ if(e.target.id === 'mapOverlay') e.currentTarget.classList.remove('open'); });

buildTabs();
renderList();
</script>
